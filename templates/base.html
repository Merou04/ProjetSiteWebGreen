<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GreenSpot{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}

    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: rgba(255,255,255,.85);
            border: 1px solid var(--primary-color, #2d6a4f);
            color: var(--primary-color, #2d6a4f);
            font-size: .8rem;
            font-weight: 600;
            padding: .3rem .9rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        .recent-spots { padding: 5rem 0; }

        .spots-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .spot-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.4rem;
            box-shadow: 0 2px 12px rgba(45,106,79,.08);
            transition: transform .2s, box-shadow .2s;
        }

        .spot-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(45,106,79,.14);
        }

        .spot-card-icon { font-size: 2.2rem; margin-bottom: .75rem; }
        .spot-card h3 { font-size: 1rem; margin-bottom: .3rem; }
        .spot-author { font-size: .8rem; color: #5a6b5e; margin-bottom: .75rem; }

        .spot-badges { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .9rem; }

        .badge {
            font-size: .72rem;
            padding: .2rem .65rem;
            border-radius: 20px;
            background: #d8f3dc;
            color: #2d6a4f;
            font-weight: 600;
        }

        .spot-link {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            font-size: .82rem;
            color: #2d6a4f;
            font-weight: 600;
            text-decoration: none;
        }

        .spot-link:hover { text-decoration: underline; }

        .green-it { padding: 5rem 0; background: #f0f7f2; }

        .green-it-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            margin-top: 2.5rem;
        }

        .green-card {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem 1.4rem;
            box-shadow: 0 2px 12px rgba(45,106,79,.08);
        }

        .green-card-ico { font-size: 1.6rem; }

        .score-banner {
            display: flex;
            justify-content: space-around;
            background: #1a2e1e;
            color: #fff;
            border-radius: 12px;
            padding: 1.25rem 2rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .score-val { font-size: 1.6rem; font-weight: 700; color: #52b788; }
    </style>
</head>

<body>

<!-- NAV (commun à toutes les pages) -->
<nav class="navbar">
    <div class="container nav-container">
        <a href="{{ url_for('index') }}" class="logo">🌱 GreenSpot</a>

        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Accueil</a></li>
            <li><a href="{{ url_for('page_spots') }}">Les spots</a></li>
            <li><a href="{{ url_for('login') }}">Connexion</a></li>
            <li><a href="{{ url_for('register') }}">S'inscrire</a></li>
            <li><a href="{{ url_for('contact') }}">Contact</a></li>
        </ul>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <div class="container footer-bottom">
        <p>&copy; 2026 GreenSpot · EFREI Paris 🌿</p>
    </div>
</footer>

</body>
</html>
